# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ecommerce_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:EverythingBlack2722}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

#JWT Config
jwt.secret=${JWT_SECRET:85d9ffc489f0eec7e26d8cb6fb8c4af7ec1c78f800787d09e92e4626710e1937}
jwt.expiration=${JWT_EXPIRATION:86400000}

#Swagger UI
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.packagesToScan=com.samantha.ecommerce
springdoc.pathsToMatch=/api/**
# App name
spring.application.name=ecommerce
